<body class="p-4 md:p-6">

<div class="max-w-[1400px] mx-auto">
    <header class="mb-6 flex justify-between items-end">
        <div>
            <h1 class="text-2xl font-bold text-slate-800">Kalkulator Potongan Kertas</h1>
            <p class="text-slate-500 text-sm">Optimasi 12 Model Susunan (Python Logic Port)</p>
        </div>
        <div class="bg-white p-2 rounded-lg shadow-sm border">
            <select id="unit" onchange="convertUnits()" class="bg-transparent font-medium outline-none cursor-pointer text-sm">
                <option value="mm">Milimeter (mm)</option>
                <option value="cm">Sentimeter (cm)</option>
            </select>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
        <div class="lg:col-span-3 space-y-4">
            <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
                <h2 class="font-semibold text-slate-700 mb-4 flex items-center text-sm uppercase tracking-wider">
                    <svg class="w-4 h-4 mr-2 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                    Ukuran Input
                </h2>
                
                <div class="space-y-3">
                    <div class="grid grid-cols-2 gap-2">
                        <div class="col-span-2 text-[10px] font-bold text-slate-400 uppercase">Ukuran Kertas</div>
                        <input type="number" id="sheet_w" value="325" class="w-full p-2 border rounded-md text-sm outline-blue-500">
                        <input type="number" id="sheet_h" value="485" class="w-full p-2 border rounded-md text-sm outline-blue-500">
                    </div>

                    <div class="grid grid-cols-2 gap-2">
                        <div class="col-span-2 text-[10px] font-bold text-slate-400 uppercase">Ukuran Potongan</div>
                        <input type="number" id="piece_w" value="123" class="w-full p-2 border rounded-md text-sm outline-blue-500">
                        <input type="number" id="piece_h" value="84" class="w-full p-2 border rounded-md text-sm outline-blue-500">
                    </div>

                    <div class="grid grid-cols-2 gap-2">
                        <div class="col-span-2 text-[10px] font-bold text-slate-400 uppercase">Jarak & Margin</div>
                        <input type="number" id="gap_x" value="2" title="Gap X" class="w-full p-2 border rounded-md text-sm outline-blue-500">
                        <input type="number" id="gap_y" value="2" title="Gap Y" class="w-full p-2 border rounded-md text-sm outline-blue-500">
                        <input type="number" id="margin" value="0" title="Margin" class="col-span-2 w-full p-2 border rounded-md text-sm outline-blue-500">
                    </div>

                    <button onclick="calculate()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-all mt-2 shadow-lg shadow-blue-200">
                        HITUNG SEKARANG
                    </button>
                </div>
            </div>

            <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
                <h3 class="font-semibold text-slate-700 mb-2 text-sm">Opsi Preview</h3>
                <label class="flex items-center space-x-2 text-xs text-slate-600 cursor-pointer">
                    <input type="checkbox" id="center_preview" checked onchange="draw()" class="w-4 h-4 rounded text-blue-600">
                    <span>Pusatkan Layout</span>
                </label>
                <button onclick="resetOffset()" class="mt-3 w-full text-[10px] text-blue-600 hover:underline uppercase font-bold tracking-tighter">Reset Posisi Geser</button>
            </div>
        </div>

        <div class="lg:col-span-4 bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">
            <div class="p-4 bg-slate-50 border-b flex justify-between items-center">
                <h2 class="font-bold text-slate-700 text-xs uppercase tracking-widest">Daftar Model</h2>
                <span class="text-[10px] bg-green-100 text-green-700 px-2 py-0.5 rounded-full font-bold">OPTIMASI 12 MODEL</span>
            </div>
            <div class="overflow-y-auto max-h-[600px] flex-grow">
                <table class="w-full text-left text-sm">
                    <thead class="sticky top-0 bg-white shadow-sm">
                        <tr class="text-slate-400 border-b text-[11px] uppercase">
                            <th class="p-3 font-semibold">Tipe Susunan</th>
                            <th class="p-3 font-semibold text-center">Hasil</th>
                        </tr>
                    </thead>
                    <tbody id="results_list" class="divide-y">
                    </tbody>
                </table>
            </div>
        </div>

        <div class="lg:col-span-5 flex flex-col space-y-4">
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-0 flex-grow min-h-[500px] relative canvas-container overflow-hidden">
                <div id="model_info_slim" class="absolute top-0 left-0 right-0 z-10 flex justify-between items-center bg-slate-900/90 backdrop-blur-md text-white px-4 py-2.5 text-[11px] pointer-events-none">
                    <div id="info_text_slim">Memproses data...</div>
                    <div id="best_badge" class="hidden items-center bg-green-500 text-white px-2 py-0.5 rounded font-bold uppercase tracking-tighter animate-pulse">
                        ⭐ Model Terbaik
                    </div>
                </div>
                <canvas id="previewCanvas" class="w-full h-full cursor-move"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    let results = [];
    let selectedId = null;
    let offset = { x: 0, y: 0 };
    let isDragging = false;
    let dragStart = { x: 0, y: 0 };
    let lastUnit = 'mm';

    const canvas = document.getElementById('previewCanvas');
    const ctx = canvas.getContext('2d');

    const getVal = (id) => parseFloat(document.getElementById(id).value) || 0;
    const toMM = (val) => document.getElementById('unit').value === 'cm' ? val * 10 : val;
    const fromMM = (val) => document.getElementById('unit').value === 'cm' ? val / 10 : val;

    function convertUnits() {
        const unit = document.getElementById('unit').value;
        const factor = (unit === 'cm' && lastUnit === 'mm') ? 0.1 : (unit === 'mm' && lastUnit === 'cm') ? 10 : 1;
        ['sheet_w', 'sheet_h', 'piece_w', 'piece_h', 'gap_x', 'gap_y', 'margin'].forEach(id => {
            document.getElementById(id).value = (getVal(id) * factor).toFixed(unit === 'cm' ? 1 : 0);
        });
        lastUnit = unit;
        calculate();
    }

    function resetOffset() { offset = { x: 0, y: 0 }; draw(); }

    function gridFit(areaW, areaH, pw, ph, gx, gy) {
        if (areaW <= 0 || areaH <= 0) return { t: 0, c: 0, r: 0 };
        const c = Math.floor((areaW + gx) / (pw + gx));
        const r = Math.floor((areaH + gy) / (ph + gy));
        if (c <= 0 || r <= 0) return { t: 0, c: 0, r: 0 };
        return { t: c * r, c, r, uw: c * pw + (c - 1) * gx, uh: r * ph + (r - 1) * gy };
    }

    function rectsGrid(ox, oy, cols, rows, pw, ph, gx, gy) {
        const list = [];
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                list.push({ x: ox + c * (pw + gx), y: oy + r * (ph + gy), w: pw, h: ph });
            }
        }
        return list;
    }

    function calculate() {
        const sw = toMM(getVal('sheet_w')), sh = toMM(getVal('sheet_h'));
        const pw = toMM(getVal('piece_w')), ph = toMM(getVal('piece_h'));
        const gx = toMM(getVal('gap_x')), gy = toMM(getVal('gap_y'));
        const mg = toMM(getVal('margin'));

        const ew = sw - 2 * mg, eh = sh - 2 * mg;
        if (ew <= 0 || eh <= 0) return;

        results = [];
        const P = { w: pw, h: ph }, L = { w: ph, h: pw };

        // 1 & 2 Full
        let fP = gridFit(ew, eh, P.w, P.h, gx, gy);
        results.push({ id: 1, name: "Model 1: Full Portrait", total: fP.t, rects: rectsGrid(0, 0, fP.c, fP.r, P.w, P.h, gx, gy) });
        let fL = gridFit(ew, eh, L.w, L.h, gx, gy);
        results.push({ id: 2, name: "Model 2: Full Landscape", total: fL.t, rects: rectsGrid(0, 0, fL.c, fL.r, L.w, L.h, gx, gy) });

        // 3 - 6 Strips
        const stripConfigs = [
            { id: 3, n: "Model 3: P + L Strip Kanan", m: P, e: L, type: 'right' },
            { id: 4, n: "Model 4: P + L Strip Bawah", m: P, e: L, type: 'bottom' },
            { id: 5, n: "Model 5: L + P Strip Kanan", m: L, e: P, type: 'right' },
            { id: 6, n: "Model 6: L + P Strip Bawah", m: L, e: P, type: 'bottom' }
        ];

        stripConfigs.forEach(s => {
            let main = gridFit(ew, eh, s.m.w, s.m.h, gx, gy);
            let rects = rectsGrid(0, 0, main.c, main.r, s.m.w, s.m.h, gx, gy);
            let total = main.t;
            if (s.type === 'right') {
                let extra = gridFit(ew - main.uw - gx, eh, s.e.w, s.e.h, gx, gy);
                rects.push(...rectsGrid(main.uw + gx, 0, extra.c, extra.r, s.e.w, s.e.h, gx, gy));
                total += extra.t;
            } else {
                let extra = gridFit(ew, eh - main.uh - gy, s.e.w, s.e.h, gx, gy);
                rects.push(...rectsGrid(0, main.uh + gy, extra.c, extra.r, s.e.w, s.e.h, gx, gy));
                total += extra.t;
            }
            results.push({ id: s.id, name: s.n, total, rects });
        });

        // 7 - 10 2V
        const vBandConfigs = [
            { id: 7, n: "Model 7: 2V (P+L) + Isi Bawah", l: P, r: L },
            { id: 8, n: "Model 8: 2V (L+P) + Isi Bawah", l: L, r: P },
            { id: 9, n: "Model 9: 2V (P+P) + Isi Bawah", l: P, r: P },
            { id: 10, n: "Model 10: 2V (L+L) + Isi Bawah", l: L, r: L }
        ];

        vBandConfigs.forEach(v => {
            let bestT = 0, bestR = [];
            for (let lc = 0; lc <= Math.floor((ew+gx)/(v.l.w+gx)); lc++) {
                let luw = lc > 0 ? lc * v.l.w + (lc-1)*gx : 0;
                for (let rc = 0; rc <= Math.floor((ew+gx)/(v.r.w+gx)); rc++) {
                    let ruw = rc > 0 ? rc * v.r.w + (rc-1)*gx : 0;
                    if (luw + ruw + (lc>0 && rc>0 ? gx : 0) > ew) continue;
                    let rx = lc > 0 ? luw + gx : 0;
                    let mLR = Math.floor((eh+gy)/(v.l.h+gy)), mRR = Math.floor((eh+gy)/(v.r.h+gy));
                    let curR = [], curT = 0;
                    if (lc > 0) {
                        curR.push(...rectsGrid(0, 0, lc, mLR, v.l.w, v.l.h, gx, gy));
                        curT += lc * mLR;
                        let fH = eh - (mLR*v.l.h + (mLR-1)*gy);
                        let fill = gridFit(luw, fH - gy, v.r.w, v.r.h, gx, gy);
                        curR.push(...rectsGrid(0, eh - fH + gy, fill.c, fill.r, v.r.w, v.r.h, gx, gy));
                        curT += fill.t;
                    }
                    if (rc > 0) {
                        curR.push(...rectsGrid(rx, 0, rc, mRR, v.r.w, v.r.h, gx, gy));
                        curT += rc * mRR;
                        let fH = eh - (mRR*v.r.h + (mRR-1)*gy);
                        let fill = gridFit(ruw, fH - gy, v.l.w, v.l.h, gx, gy);
                        curR.push(...rectsGrid(rx, eh - fH + gy, fill.c, fill.r, v.l.w, v.l.h, gx, gy));
                        curT += fill.t;
                    }
                    if (curT > bestT) { bestT = curT; bestR = curR; }
                }
            }
            results.push({ id: v.id, name: v.n, total: bestT, rects: bestR });
        });

        // 11 - 12 2H
        const hBandConfigs = [
            { id: 11, n: "Model 11: 2H (P+L) + Isi Kanan", t: P, b: L },
            { id: 12, n: "Model 12: 2H (L+P) + Isi Kanan", t: L, b: P }
        ];

        hBandConfigs.forEach(h => {
            let bestT = 0, bestR = [];
            for (let tr = 0; tr <= Math.floor((eh+gy)/(h.t.h+gy)); tr++) {
                let tuh = tr > 0 ? tr * h.t.h + (tr-1)*gy : 0;
                for (let br = 0; br <= Math.floor((eh+gy)/(h.b.h+gy)); br++) {
                    let buh = br > 0 ? br * h.b.h + (br-1)*gy : 0;
                    if (tuh + buh + (tr>0 && br>0 ? gy : 0) > eh) continue;
                    let by = tr > 0 ? tuh + gy : 0;
                    let mTC = Math.floor((ew+gx)/(h.t.w+gx)), mBC = Math.floor((ew+gx)/(h.b.w+gx));
                    let curR = [], curT = 0;
                    if (tr > 0) {
                        curR.push(...rectsGrid(0, 0, mTC, tr, h.t.w, h.t.h, gx, gy));
                        curT += tr * mTC;
                        let fW = ew - (mTC*h.t.w + (mTC-1)*gx);
                        let fill = gridFit(fW - gx, tuh, h.b.w, h.b.h, gx, gy);
                        curR.push(...rectsGrid(ew - fW + gx, 0, fill.c, fill.r, h.b.w, h.b.h, gx, gy));
                        curT += fill.t;
                    }
                    if (br > 0) {
                        curR.push(...rectsGrid(0, by, mBC, br, h.b.w, h.b.h, gx, gy));
                        curT += br * mBC;
                        let fW = ew - (mBC*h.b.w + (mBC-1)*gx);
                        let fill = gridFit(fW - gx, buh, h.t.w, h.t.h, gx, gy);
                        curR.push(...rectsGrid(ew - fW + gx, by, fill.c, fill.r, h.t.w, h.t.h, gx, gy));
                        curT += fill.t;
                    }
                    if (curT > bestT) { bestT = curT; bestR = curR; }
                }
            }
            results.push({ id: h.id, name: h.n, total: bestT, rects: bestR });
        });

        const best = results.reduce((a, b) => a.total > b.total ? a : b);
        selectedId = best.id;
        renderList();
        draw();
    }

    function renderList() {
        const container = document.getElementById('results_list');
        const maxTotal = Math.max(...results.map(r => r.total));
        container.innerHTML = "";
        
        results.forEach(r => {
            const isBest = r.total === maxTotal && maxTotal > 0;
            const div = document.createElement('tr');
            div.className = `cursor-pointer hover:bg-blue-50 transition-all ${r.id === selectedId ? 'active-model' : ''} ${isBest ? 'best-model-row' : ''}`;
            
            div.innerHTML = `
                <td class="p-3">
                    <div class="flex items-center space-x-2">
                        <span class="font-medium text-slate-700">${r.name}</span>
                        ${isBest ? '<span class="text-[9px] bg-green-500 text-white px-1.5 py-0.5 rounded-full font-bold">TERBAIK</span>' : ''}
                    </div>
                </td>
                <td class="p-3 text-center font-bold ${isBest ? 'text-green-600' : 'text-blue-600'} text-base">${r.total}</td>
            `;
            div.onclick = () => { selectedId = r.id; renderList(); draw(); };
            container.appendChild(div);
        });
    }

    function draw() {
        const sw = toMM(getVal('sheet_w')), sh = toMM(getVal('sheet_h'));
        const mg = toMM(getVal('margin'));
        const isCenter = document.getElementById('center_preview').checked;
        const model = results.find(r => r.id === selectedId);
        const maxTotal = Math.max(...results.map(r => r.total));

        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (!model) return;

        const scale = Math.min((canvas.width - 60) / sw, (canvas.height - 100) / sh);
        const ox = (canvas.width - sw * scale) / 2;
        const oy = (canvas.height - sh * scale) / 2 + 15;

        // Paper
        ctx.fillStyle = "white";
        ctx.shadowColor = "rgba(0,0,0,0.15)"; ctx.shadowBlur = 20;
        ctx.fillRect(ox, oy, sw * scale, sh * scale);
        ctx.shadowBlur = 0;
        ctx.strokeStyle = "#000"; ctx.lineWidth = 1.5;
        ctx.strokeRect(ox, oy, sw * scale, sh * scale);

        // Margin
        if (mg > 0) {
            ctx.strokeStyle = "#94a3b8"; ctx.setLineDash([4, 4]);
            ctx.strokeRect(ox + mg * scale, oy + mg * scale, (sw - 2 * mg) * scale, (sh - 2 * mg) * scale);
            ctx.setLineDash([]);
        }

        let sx = 0, sy = 0;
        if (isCenter && model.rects.length > 0) {
            const maxX = Math.max(...model.rects.map(r => r.x + r.w));
            const maxY = Math.max(...model.rects.map(r => r.y + r.h));
            sx = (sw - 2 * mg - maxX) / 2;
            sy = (sh - 2 * mg - maxY) / 2;
        }

        // Rectangles
        const isBestModel = model.total === maxTotal && maxTotal > 0;
        ctx.fillStyle = isBestModel ? "#22c55e" : "#3b82f6"; 
        ctx.strokeStyle = isBestModel ? "#166534" : "#1e40af";
        
        model.rects.forEach(r => {
            const rx = ox + (mg + r.x + sx + offset.x) * scale;
            const ry = oy + (mg + r.y + sy + offset.y) * scale;
            ctx.globalAlpha = 0.5;
            ctx.fillRect(rx, ry, r.w * scale, r.h * scale);
            ctx.globalAlpha = 1.0;
            ctx.strokeRect(rx, ry, r.w * scale, r.h * scale);
        });

        // Update Info Header
        const unit = document.getElementById('unit').value;
        const badge = document.getElementById('best_badge');
        
        if (isBestModel) badge.classList.replace('hidden', 'flex');
        else badge.classList.replace('flex', 'hidden');

        document.getElementById('info_text_slim').innerHTML = 
            `<span class="text-slate-400">MODEL:</span> <b>${model.name}</b> &nbsp;|&nbsp; <span class="text-slate-400">TOTAL:</span> <b>${model.total} pcs</b>`;
    }

    canvas.onmousedown = (e) => { isDragging = true; dragStart = { x: e.clientX, y: e.clientY }; };
    window.onmousemove = (e) => {
        if (!isDragging) return;
        const sw = toMM(getVal('sheet_w')), sh = toMM(getVal('sheet_h'));
        const scale = Math.min((canvas.width - 60) / sw, (canvas.height - 100) / sh);
        offset.x += (e.clientX - dragStart.x) / scale;
        offset.y += (e.clientY - dragStart.y) / scale;
        dragStart = { x: e.clientX, y: e.clientY };
        draw();
    };
    window.onmouseup = () => isDragging = false;

    calculate();
</script>
</body>
</html>
